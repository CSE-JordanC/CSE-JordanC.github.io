<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>SkillSwap Hub — Skills</title>

        <!-- Google fonts used in the design -->
        <link href="https://fonts.googleapis.com/css2?family=Kadwa:wght@400;700&family=Irish+Grover&display=swap" rel="stylesheet">

        <link rel="stylesheet" href="styles.css" />
    </head>

    <body>
        <div class="page skills-page">

            <!-- Header -->
            <header class="site-header">
                <!-- brand is now a link to home for logo + text clickability -->
                <a class="brand-link" href="index.html" aria-label="Return to SkillSwap Hub home">
                    <div class="brand">
                        <div class="brand-title">SkillSwap Hub</div>
                        <div class="brand-sub">Learn, Share, Grow</div>
                    </div>
                </a>

                <!-- Nav Toggle Button -->
                <button class="nav-toggle" id="navToggle" aria-label="Toggle Navigation">
                    ☰
                </button>

                <nav id="mainNav" class="main-nav" aria-label="Main navigation">
                    <a class="nav-link" href="index.html">Home</a>
                    <a class="nav-link active" href="skills.html">Skills</a>
                    <a class="nav-link" href="news.html">News</a>
                </nav>

                <div class="auth">
                    <button class="btn btn-accent">Login/Sign Up</button>
                </div>
            </header>

            <!-- Top hero / search band (white area above gray content) -->
            <section class="hero-compact">
                <div class="hero-copy">
                    <h1 class="hero-compact-title">Post Your Own Community Skill</h1>
                    <p class="hero-compact-sub">Help the community by sharing your very own hand crafted skill.</p>

                    <div class="hero-compact-actions">
                        <button class="btn btn-primary">Post Skill</button>
                    </div>
                </div>

                <div class="hero-compact-art">
                    <img src="images/shareskills.png" alt="Community skill artwork" />
                </div>
            </section>

            <div class="search-heading">
                <p>Find instructors and peer helpers by category, experience, or location.</p>
            </div>

            <!-- Search / filter row -->
            <section class="search-filter">
                <div class="search-actions">
                    <!-- left 'search' control -->
                    <button class="search-btn" aria-label="Search">
                        <span class="search-label">Search</span>
                        <img src="images/search.png" alt="" class="search-icon" />
                    </button>
                
                    <!-- right filter control -->
                    <button class="filter-btn" aria-label="Filter skills">
                        Filter | Skills 
                    </button>
                </div>
            </section>

            <!-- Main content area -->
            <main class="content-area">

                <!-- Grid of featured skill cards -->
                <section class="cards-section">
                    <div class="cards-grid"></div>
                </section>

                <!-- Pagination control -->
                <nav class="pagination" aria-label="Skills pagination">
                    <button class="page-btn">&lt;</button>
                    <button class="page-btn">1</button>
                    <button class="page-btn">2</button>
                    <button class="page-btn">3</button>
                    <button class="page-btn">4</button>
                    <button class="page-btn">5</button>
                    <button class="page-btn">6</button>
                    <button class="page-btn"> &gt;</button>
                </nav>

            </main>

            <!-- Footer -->
            <footer class="site-footer">
                <div class="footer-cta"></div>
            </footer>

            <footer class="bottom-site-footer">
                <div class="site-footer-sub">
                    © <span id="year"></span> SkillSwap Hub · <a class="footer-link" href="#">Terms</a> · <a class="footer-link" href="#">Privacy</a>
                </div>
            </footer>

        </div>

        <script src="script.js"></script>
    </body>
</html>
